<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球 GDP 3D 可视化 (稳定版)</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
    
    #title-card { 
      position: absolute; top: 20px; left: 20px; 
      color: rgba(255, 255, 255, 0.9); z-index: 1; pointer-events: none; 
    }
    h1 { margin: 0; font-size: 24px; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
    
    /* 加载提示样式 */
    #loading { 
      position: absolute; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); 
      color: #0ff; font-size: 16px; 
      background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #333;
      text-align: center;
    }
  </style>

  <script src="https://lib.baomitu.com/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.30.0/dist/globe.gl.min.js"></script>
</head>
<body>

  <div id="title-card">
    <h1>GLOBAL ECONOMIC VISION</h1>
    <p>Interactive 3D Visualization of GDP</p>
  </div>
  
  <div id="loading">
    正在初始化地球引擎...<br>
    <span style="font-size:12px;color:#666">(如果长时间停留在此，请检查网络)</span>
  </div>
  
  <div id="globeViz"></div>

  <script>
    // 检查依赖是否加载成功
    if (typeof Globe === 'undefined') {
        document.getElementById('loading').innerHTML = '<span style="color:red">错误：Globe.gl 库加载失败。<br>请尝试刷新或更换网络环境。</span>';
        throw new Error("Globe library not loaded");
    }

    // 【关键修改 2】颜色生成器 (带 D3 失败的兜底逻辑)
    let colorScale;
    if (typeof d3 !== 'undefined') {
        // 如果 D3 加载成功，使用高级的 Plasma 渐变色
        colorScale = d3.scaleSequentialSqrt(d3.interpolatePlasma).domain([0, 1e11]);
    } else {
        console.warn('D3 加载失败，使用简易颜色模式');
        // 简易兜底：根据数值返回从蓝到红的颜色
        colorScale = (value) => {
             // 简单的线性映射
             const max = 1e11; 
             const t = Math.min(value / max, 1); 
             return t > 0.5 ? '#ff0055' : '#00aaff';
        };
        colorScale.domain = () => {}; // 模拟 domain 方法防止报错
    }

    // 使用 jsDelivr 加速地图数据下载
    const GEOJSON_URL = 'https://cdn.jsdelivr.net/gh/vasturiano/globe.gl@master/example/datasets/ne_110m_admin_0_countries.geojson';

    document.getElementById('loading').innerText = "正在下载地图数据...";

    fetch(GEOJSON_URL)
      .then(res => {
        if (!res.ok) throw new Error('地图数据下载失败');
        return res.json();
      })
      .then(countries => {
        document.getElementById('loading').style.display = 'none';

        // 模拟数据逻辑
        countries.features.forEach(feat => {
            const name = feat.properties.NAME || feat.properties.ADMIN;
            let gdp = Math.random() * 100; 
            // 给大国加权重，让图更好看
            if (['China', 'United States of America'].includes(name)) gdp *= 60;
            if (['India', 'Japan', 'Germany', 'Russia'].includes(name)) gdp *= 30;
            feat.properties.gdp = gdp; 
        });

        // 更新颜色比例尺的范围
        const maxVal = Math.max(...countries.features.map(f => f.properties.gdp));
        if (typeof d3 !== 'undefined') {
            colorScale.domain([0, maxVal]);
        }

        // 初始化地球
        const world = Globe()
          (document.getElementById('globeViz'))
          .backgroundColor('#000011') // 深蓝背景
          .showAtmosphere(true)       // 显示大气层
          .atmosphereColor('#3a228a')
          .atmosphereAltitude(0.25)
          
          // 尝试加载贴图，如果失败则只显示网格颜色
          .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg')
          
          .polygonsData(countries.features.filter(d => d.properties.ISO_A2 !== 'AQ'))
          .polygonAltitude(d => d.properties.gdp * 0.0002 + 0.01)
          .polygonCapColor(d => typeof d3 !== 'undefined' ? colorScale(d.properties.gdp) : (d.properties.gdp > 1000 ? '#ffcc00' : '#0099cc'))
          .polygonSideColor(() => 'rgba(0, 20, 50, 0.6)')
          .polygonStrokeColor(() => '#111')
          .polygonLabel(({ properties: d }) => `
            <div style="background:rgba(0,0,0,0.8);padding:8px;color:#fff;border-radius:4px;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(4px);">
               <strong style="font-size:14px;color:#0ff">${d.NAME}</strong>
               <div style="margin-top:4px;font-size:12px;color:#ccc">Index: ${Math.round(d.gdp)}</div>
            </div>
          `)
          .onPolygonHover(hoverD => {
            world
              .polygonAltitude(d => d === hoverD ? (d.properties.gdp * 0.0002 + 0.08) : (d.properties.gdp * 0.0002 + 0.01))
              .polygonCapColor(d => d === hoverD ? '#fff' : (typeof d3 !== 'undefined' ? colorScale(d.properties.gdp) : (d.properties.gdp > 1000 ? '#ffcc00' : '#0099cc')));
          });
        
        // 自动旋转与视角
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.6;
        world.pointOfView({ lat: 22, lng: 110, altitude: 2.0 }); 
      })
      .catch(err => {
        console.error(err);
        document.getElementById('loading').innerHTML = `<span style="color:red">初始化失败: ${err.message}</span><br>建议打开浏览器控制台(F12)查看详情`;
      });
  </script>
</body>
</html>
